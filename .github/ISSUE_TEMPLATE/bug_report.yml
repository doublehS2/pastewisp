name: Bug report
description: Something isn't working the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I press the hotkey, ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Copy '...'
        2. Press Ctrl+Shift+V
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pastewisp version
      description: Output of `pastewisp --version`.
    validations:
      required: true
  - type: dropdown
    id: session
    attributes:
      label: Display server
      options:
        - X11
        - Wayland
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output from `journalctl --user -u pastewisp -n 100`.
      render: shell
