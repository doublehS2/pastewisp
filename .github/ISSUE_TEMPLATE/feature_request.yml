name: Feature request
description: Suggest an idea for Pastewisp.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Pastewisp intentionally stays small and focused. Please check the
        Roadmap and non-goals in the README before requesting a feature.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
